name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Compiler test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make

      - name: Run tests
        run: cd compiler && ./run_tests.sh
